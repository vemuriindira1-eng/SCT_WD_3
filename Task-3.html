# Interactive Quiz Game Application

```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Quiz Game</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #141e30, #243b55);
      padding: 20px;
    }

    .quiz-container {
      width: 100%;
      max-width: 750px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 25px;
      padding: 35px;
      color: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .quiz-header h1 {
      font-size: 2rem;
      font-weight: 700;
    }

    .timer {
      background: #ff9800;
      padding: 10px 18px;
      border-radius: 12px;
      font-weight: 600;
    }

    .progress-container {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      margin-bottom: 25px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, #00c6ff, #0072ff);
      transition: width 0.4s ease;
    }

    .question-number {
      font-size: 0.95rem;
      opacity: 0.8;
      margin-bottom: 10px;
    }

    .question {
      font-size: 1.4rem;
      margin-bottom: 25px;
      line-height: 1.5;
      font-weight: 600;
    }

    .question-type {
      margin-bottom: 18px;
      font-size: 0.9rem;
      color: #ffd369;
    }

    .options {
      display: grid;
      gap: 15px;
    }

    .option {
      background: rgba(255,255,255,0.15);
      padding: 16px 18px;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.3s ease;
      border: 2px solid transparent;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .option:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.22);
    }

    .option.selected {
      border-color: #00c6ff;
      background: rgba(0,198,255,0.2);
    }

    input[type="text"] {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      outline: none;
      font-size: 1rem;
      margin-top: 10px;
    }

    .buttons {
      margin-top: 30px;
      display: flex;
      justify-content: space-between;
      gap: 15px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 150px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .prev-btn {
      background: #6c757d;
      color: white;
    }

    .next-btn {
      background: linear-gradient(to right, #00c6ff, #0072ff);
      color: white;
    }

    button:hover {
      transform: scale(1.03);
    }

    .result-box {
      text-align: center;
      display: none;
    }

    .result-box h2 {
      font-size: 2.3rem;
      margin-bottom: 15px;
    }

    .score {
      font-size: 1.6rem;
      margin-bottom: 20px;
      color: #ffd369;
    }

    .restart-btn {
      background: linear-gradient(to right, #00c853, #009624);
      color: white;
      margin-top: 20px;
    }

    .review {
      text-align: left;
      margin-top: 25px;
    }

    .review-item {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 15px;
    }

    .correct {
      color: #00e676;
      font-weight: 600;
    }

    .wrong {
      color: #ff5252;
      font-weight: 600;
    }

    @media (max-width: 600px) {
      .quiz-container {
        padding: 22px;
      }

      .question {
        font-size: 1.1rem;
      }

      .quiz-header h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="quiz-container">

    <div id="quiz-box">
      <div class="quiz-header">
        <h1>Quiz Master</h1>
        <div class="timer">⏳ Time: <span id="time">60</span>s</div>
      </div>

      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="question-number" id="questionNumber"></div>
      <div class="question-type" id="questionType"></div>
      <div class="question" id="question"></div>

      <div class="options" id="options"></div>

      <div class="buttons">
        <button class="prev-btn" id="prevBtn">Previous</button>
        <button class="next-btn" id="nextBtn">Next</button>
      </div>
    </div>

    <div class="result-box" id="resultBox">
      <h2>🎉 Quiz Completed!</h2>
      <div class="score" id="score"></div>
      <div id="message"></div>

      <div class="review" id="review"></div>

      <button class="restart-btn" onclick="restartQuiz()">Restart Quiz</button>
    </div>

  </div>

  <script>
    const quizData = [
      {
        type: 'single',
        question: 'Which language is mainly used for web styling?',
        options: ['HTML', 'CSS', 'Python', 'Java'],
        answer: 'CSS'
      },
      {
        type: 'multi',
        question: 'Select JavaScript frameworks/libraries.',
        options: ['React', 'Laravel', 'Vue', 'Django'],
        answer: ['React', 'Vue']
      },
      {
        type: 'fill',
        question: 'Fill in the blank: HTML stands for HyperText ______ Language.',
        answer: 'Markup'
      },
      {
        type: 'single',
        question: 'Which company developed JavaScript?',
        options: ['Netscape', 'Google', 'Microsoft', 'Apple'],
        answer: 'Netscape'
      },
      {
        type: 'multi',
        question: 'Which of these are programming languages?',
        options: ['Python', 'HTML', 'Java', 'CSS'],
        answer: ['Python', 'Java']
      }
    ];

    let currentQuestion = 0;
    let userAnswers = [];
    let timeLeft = 60;
    let timer;

    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    const questionNumber = document.getElementById('questionNumber');
    const questionType = document.getElementById('questionType');
    const progressBar = document.getElementById('progressBar');

    function startTimer() {
      timer = setInterval(() => {
        timeLeft--;
        document.getElementById('time').innerText = timeLeft;

        if (timeLeft <= 0) {
          clearInterval(timer);
          showResult();
        }
      }, 1000);
    }

    function loadQuestion() {
      const currentQuiz = quizData[currentQuestion];

      questionNumber.innerText = `Question ${currentQuestion + 1} of ${quizData.length}`;

      progressBar.style.width = `${((currentQuestion + 1) / quizData.length) * 100}%`;

      questionEl.innerText = currentQuiz.question;
      optionsEl.innerHTML = '';

      if (currentQuiz.type === 'single') {
        questionType.innerHTML = '🔘 Single Select Question';

        currentQuiz.options.forEach(option => {
          const div = document.createElement('div');
          div.classList.add('option');

          div.innerHTML = `
            <input type="radio" name="option" value="${option}">
            <label>${option}</label>
          `;

          div.addEventListener('click', () => {
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            div.classList.add('selected');
            div.querySelector('input').checked = true;
          });

          optionsEl.appendChild(div);
        });
      }

      else if (currentQuiz.type === 'multi') {
        questionType.innerHTML = '☑️ Multi Select Question';

        currentQuiz.options.forEach(option => {
          const div = document.createElement('div');
          div.classList.add('option');

          div.innerHTML = `
            <input type="checkbox" value="${option}">
            <label>${option}</label>
          `;

          div.addEventListener('click', () => {
            div.classList.toggle('selected');
            const checkbox = div.querySelector('input');
            checkbox.checked = !checkbox.checked;
          });

          optionsEl.appendChild(div);
        });
      }

      else if (currentQuiz.type === 'fill') {
        questionType.innerHTML = '✍️ Fill in the Blank';

        optionsEl.innerHTML = `
          <input type="text" id="fillInput" placeholder="Type your answer here...">
        `;
      }

      prevBtn.style.display = currentQuestion === 0 ? 'none' : 'block';

      nextBtn.innerText = currentQuestion === quizData.length - 1 ? 'Submit Quiz' : 'Next';
    }

    function saveAnswer() {
      const currentQuiz = quizData[currentQuestion];

      if (currentQuiz.type === 'single') {
        const selected = document.querySelector('input[name="option"]:checked');
        userAnswers[currentQuestion] = selected ? selected.value : null;
      }

      else if (currentQuiz.type === 'multi') {
        const checked = [...document.querySelectorAll('input[type="checkbox"]:checked')]
          .map(input => input.value);

        userAnswers[currentQuestion] = checked;
      }

      else if (currentQuiz.type === 'fill') {
        const input = document.getElementById('fillInput').value.trim();
        userAnswers[currentQuestion] = input;
      }
    }

    nextBtn.addEventListener('click', () => {
      saveAnswer();

      if (currentQuestion < quizData.length - 1) {
        currentQuestion++;
        loadQuestion();
      } else {
        clearInterval(timer);
        showResult();
      }
    });

    prevBtn.addEventListener('click', () => {
      saveAnswer();

      if (currentQuestion > 0) {
        currentQuestion--;
        loadQuestion();
      }
    });

    function showResult() {
      document.getElementById('quiz-box').style.display = 'none';
      document.getElementById('resultBox').style.display = 'block';

      let score = 0;
      let reviewHTML = '';

      quizData.forEach((quiz, index) => {
        const userAnswer = userAnswers[index];
        let correct = false;

        if (quiz.type === 'single' || quiz.type === 'fill') {
          correct = String(userAnswer).toLowerCase() === String(quiz.answer).toLowerCase();
        }

        else if (quiz.type === 'multi') {
          correct = JSON.stringify((userAnswer || []).sort()) ===
                    JSON.stringify(quiz.answer.sort());
        }

        if (correct) score++;

        reviewHTML += `
          <div class="review-item">
            <p><strong>Q${index + 1}:</strong> ${quiz.question}</p>
            <p>Your Answer: <span class="${correct ? 'correct' : 'wrong'}">
              ${Array.isArray(userAnswer) ? userAnswer.join(', ') : userAnswer || 'No Answer'}
            </span></p>
            <p>Correct Answer: <span class="correct">
              ${Array.isArray(quiz.answer) ? quiz.answer.join(', ') : quiz.answer}
            </span></p>
          </div>
        `;
      });

      document.getElementById('score').innerText = `You scored ${score} / ${quizData.length}`;

      let message = '';

      if (score === quizData.length) {
        message = '🏆 Excellent! Perfect Score!';
      } else if (score >= 3) {
        message = '👏 Great Job! Keep Learning!';
      } else {
        message = '📚 Practice More and Try Again!';
      }

      document.getElementById('message').innerHTML = `<h3>${message}</h3>`;
      document.getElementById('review').innerHTML = reviewHTML;
    }

    function restartQuiz() {
      currentQuestion = 0;
      userAnswers = [];
      timeLeft = 60;

      document.getElementById('time').innerText = timeLeft;

      document.getElementById('quiz-box').style.display = 'block';
      document.getElementById('resultBox').style.display = 'none';

      clearInterval(timer);
      startTimer();
      loadQuestion();
    }

    startTimer();
    loadQuestion();
  </script>

</body>
</html>
